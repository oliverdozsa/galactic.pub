<div class="join">
  <button *ngIf="hasPrev" class="btn btn-sm join-item">«</button>
  <button *ngIf="!hasPrev" class="btn btn-sm btn-disabled join-item">«</button>

  <button *ngFor="let page of pages" class="btn btn-sm join-item" [class.btn-active]="page == current"
          (click)="onPageNumberSelected(page)">
    {{page}}
  </button>

  <button *ngIf="hasNext" class="btn btn-sm join-item">»</button>
  <button *ngIf="!hasNext" class="btn btn-sm btn-disabled join-item">»</button>
</div>
